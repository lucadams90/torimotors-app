<body>
    <div id="root"></div>

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD-u0q6IBYpGxJaHUHoZqFqeFz2ONzLmXo",
            authDomain: "tori-gest.firebaseapp.com",
            projectId: "tori-gest",
            storageBucket: "tori-gest.firebasestorage.app",
            messagingSenderId: "494611155773",
            appId: "1:494611155773:web:aa077e1ad26beb43f11354"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        // Storage helper functions
        const uploadFile = async (file, path) => {
            const storageRef = storage.ref(path);
            const snapshot = await storageRef.put(file);
            return await snapshot.ref.getDownloadURL();
        };
        
        const deleteFile = async (url) => {
            try {
                const fileRef = storage.refFromURL(url);
                await fileRef.delete();
            } catch (error) {
                console.error('Error deleting file:', error);
            }
        };
        
        // Receipt counter management
        const getNextReceiptNumber = async () => {
            const counterDoc = await db.collection('settings').doc('receiptCounter').get();
            if (!counterDoc.exists) {
                await db.collection('settings').doc('receiptCounter').set({ count: 1 });
                return 1;
            }
            const newCount = counterDoc.data().count + 1;
            await db.collection('settings').doc('receiptCounter').update({ count: newCount });
            return newCount;
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Check routes
            const isTradeCatalog = window.location.pathname === '/catalogo' || window.location.hash === '#/catalogo';
            const isPublicSale = window.location.pathname === '/vendita' || window.location.hash === '#/vendita';
            
            // Trade catalog (with password)
            if (isTradeCatalog) {
                return <TradeCatalog />;
            }

            // Public sale catalog (no password)
            if (isPublicSale) {
                return <PublicSaleCatalog />;
            }

            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [vehicles, setVehicles] = useState([]);
            const [currentView, setCurrentView] = useState('parco');
            const [selectedVehicle, setSelectedVehicle] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterStatus, setFilterStatus] = useState('in-stock');
            const [sidebarOpen, setSidebarOpen] = useState(false);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setUser(user);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) {
                    setVehicles([]);
                    return;
                }

                const unsubscribe = db.collection('vehicles')
                    .where('userId', '==', user.uid)
                    .orderBy('createdAt', 'desc')
                    .onSnapshot((snapshot) => {
                        const vehiclesData = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        setVehicles(vehiclesData);
                    }, (error) => {
                        console.error('Error loading vehicles:', error);
                    });

                return () => unsubscribe();
            }, [user]);

            // Weekly automatic backup
            useEffect(() => {
                if (!user) return;

                const checkAndCreateBackup = async () => {
                    const today = new Date();
                    const dayOfWeek = today.getDay(); // 0 = Sunday
                    
                    // Only run on Sundays
                    if (dayOfWeek !== 0) return;

                    // Check if backup was already created today
                    const lastBackupKey = 'lastBackupDate';
                    const lastBackup = localStorage.getItem(lastBackupKey);
                    const todayStr = today.toISOString().split('T')[0];

                    if (lastBackup === todayStr) {
                        console.log('Backup already created today');
                        return;
                    }

                    try {
                        console.log('Creating automatic weekly backup...');
                        
                        // Fetch all vehicles
                        const snapshot = await db.collection('vehicles').get();
                        const vehiclesData = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));

                        // Create backup object
                        const backup = {
                            timestamp: new Date().toISOString(),
                            vehiclesCount: vehiclesData.length,
                            vehicles: vehiclesData,
                            automatic: true
                        };

                        // Generate filename
                        const filename = `backup-${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}.json`;

                        // Upload to Firebase Storage
                        const storageRef = storage.ref(`backups/${filename}`);
                        await storageRef.putString(JSON.stringify(backup, null, 2), 'raw', {
                            contentType: 'application/json'
                        });

                        // Clean old backups (keep only last 20)
                        const MAX_BACKUPS = 20;
                        const backupsRef = storage.ref('backups');
                        const result = await backupsRef.listAll();
                        
                        if (result.items.length > MAX_BACKUPS) {
                            const backupList = await Promise.all(
                                result.items.map(async (item) => {
                                    const metadata = await item.getMetadata();
                                    return {
                                        ref: item,
                                        created: new Date(metadata.timeCreated)
                                    };
                                })
                            );

                            backupList.sort((a, b) => a.created - b.created);
                            const toDelete = backupList.slice(0, backupList.length - MAX_BACKUPS);
                            await Promise.all(toDelete.map(item => item.ref.delete()));
                            console.log(`Cleaned ${toDelete.length} old backups`);
                        }

                        // Mark backup as created today
                        localStorage.setItem(lastBackupKey, todayStr);
                        console.log('Automatic weekly backup created successfully');
                    } catch (error) {
                        console.error('Error creating automatic backup:', error);
                    }
                };

                // Check immediately on mount
                checkAndCreateBackup();

                // Check every hour (in case app stays open)
                const interval = setInterval(checkAndCreateBackup, 60 * 60 * 1000);
                return () => clearInterval(interval);
            }, [user]);

            const addVehicle = async (vehicle) => {
                try {
                    await db.collection('vehicles').add({
                        ...vehicle,
                        userId: user.uid,
                        expenses: [],
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (error) {
                    console.error('Error adding vehicle:', error);
                    alert('Errore nel salvare il veicolo');
                }
            };

            const updateVehicle = async (id, updates) => {
                try {
                    await db.collection('vehicles').doc(id).update(updates);
                    // Update local state for immediate UI update
                    if (selectedVehicle && selectedVehicle.id === id) {
                        setSelectedVehicle({ ...selectedVehicle, ...updates });
                    }
                } catch (error) {
                    console.error('Error updating vehicle:', error);
                    alert('Errore nell\'aggiornare il veicolo');
                }
            };

            const deleteVehicle = async (id) => {
                if (confirm('Sei sicuro di voler eliminare questo veicolo?')) {
                    try {
                        await db.collection('vehicles').doc(id).delete();
                        setSelectedVehicle(null);
                    } catch (error) {
                        console.error('Error deleting vehicle:', error);
                        alert('Errore nell\'eliminare il veicolo');
                    }
                }
            };

            const addExpense = async (vehicleId, expense) => {
                const vehicle = vehicles.find(v => v.id === vehicleId);
                if (vehicle) {
                    const newExpense = { ...expense, id: Date.now() };
                    await updateVehicle(vehicleId, {
                        expenses: [...(vehicle.expenses || []), newExpense]
                    });
                }
            };

            const deleteExpense = async (vehicleId, expenseId) => {
                const vehicle = vehicles.find(v => v.id === vehicleId);
                if (vehicle) {
                    await updateVehicle(vehicleId, {
                        expenses: vehicle.expenses.filter(e => e.id !== expenseId)
                    });
                }
            };

            const handleLogout = async () => {
                try {
                    await auth.signOut();
                } catch (error) {
                    console.error('Error logging out:', error);
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-800 to-blue-900 flex items-center justify-center">
                        <div className="text-white text-center">
                            <i className="fas fa-spinner fa-spin text-6xl mb-4"></i>
                            <p className="text-xl">Caricamento...</p>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return <LoginPage />;
            }

            return (
                <div className="flex h-screen bg-gray-100 overflow-hidden">
                    <Sidebar 
                        currentView={currentView}
                        setCurrentView={setCurrentView}
                        sidebarOpen={sidebarOpen}
                        setSidebarOpen={setSidebarOpen}
                        vehiclesCount={vehicles.length}
                    />

                    <div className="flex-1 flex flex-col overflow-hidden">
                        <Header 
                            setSidebarOpen={setSidebarOpen}
                            onLogout={handleLogout}
                            userEmail={user.email}
                        />

                        <main className="flex-1 overflow-y-auto bg-gray-50">
                            {currentView === 'parco' && (
                                <ParcoAuto
                                    vehicles={vehicles}
                                    searchQuery={searchQuery}
                                    setSearchQuery={setSearchQuery}
                                    filterStatus={filterStatus}
                                    setFilterStatus={setFilterStatus}
                                    onSelectVehicle={setSelectedVehicle}
                                    onAddVehicle={() => {
                                        setSelectedVehicle(null);
                                        setIsEditing(true);
                                    }}
                                />
                            )}

                            {currentView === 'logistica' && (
                                <Logistica vehicles={vehicles} onSelectVehicle={setSelectedVehicle} />
                            )}

                            {currentView === 'analisi' && (
                                <AnalisiMargini vehicles={vehicles} />
                            )}

                            {currentView === 'impostazioni' && (
                                <BackupSettings user={user} />
                            )}

                            {selectedVehicle && !isEditing && (
                                <VehicleDetail
                                    vehicle={selectedVehicle}
                                    onClose={() => setSelectedVehicle(null)}
                                    onEdit={() => setIsEditing(true)}
                                    onDelete={deleteVehicle}
                                    onAddExpense={addExpense}
                                    onDeleteExpense={deleteExpense}
                                    onUpdate={updateVehicle}
                                />
                            )}

                            {isEditing && (
                                <VehicleForm
                                    vehicle={selectedVehicle}
                                    onSave={async (vehicle) => {
                                        if (selectedVehicle) {
                                            await updateVehicle(selectedVehicle.id, vehicle);
                                            setSelectedVehicle({ ...selectedVehicle, ...vehicle });
                                        } else {
                                            await addVehicle(vehicle);
                                        }
                                        setIsEditing(false);
                                    }}
                                    onCancel={() => {
                                        setIsEditing(false);
                                        if (!selectedVehicle) setSelectedVehicle(null);
                                    }}
                                />
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        // Backup Settings Component
        function BackupSettings({ user }) {
            const [backups, setBackups] = useState([]);
            const [loading, setLoading] = useState(true);
            const [creating, setCreating] = useState(false);

            const MAX_BACKUPS = 20; // 5 months of weekly backups

            // Load available backups
            useEffect(() => {
                loadBackups();
            }, []);

            const loadBackups = async () => {
                try {
                    const storageRef = storage.ref('backups');
                    const result = await storageRef.listAll();
                    
                    const backupList = await Promise.all(
                        result.items.map(async (item) => {
                            const url = await item.getDownloadURL();
                            const metadata = await item.getMetadata();
                            return {
                                name: item.name,
                                url: url,
                                size: metadata.size,
                                created: metadata.timeCreated,
                                fullPath: item.fullPath
                            };
                        })
                    );

                    // Sort by date, newest first
                    backupList.sort((a, b) => new Date(b.created) - new Date(a.created));
                    setBackups(backupList);
                    setLoading(false);
                } catch (error) {
                    console.error('Error loading backups:', error);
                    setLoading(false);
                }
            };

            const createBackup = async () => {
                setCreating(true);
                try {
                    // Fetch all vehicles data
                    const snapshot = await db.collection('vehicles').get();
                    const vehiclesData = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));

                    // Create backup object
                    const backup = {
                        timestamp: new Date().toISOString(),
                        vehiclesCount: vehiclesData.length,
                        vehicles: vehiclesData
                    };

                    // Generate filename
                    const date = new Date();
                    const filename = `backup-${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}.json`;

                    // Upload to Firebase Storage
                    const storageRef = storage.ref(`backups/${filename}`);
                    await storageRef.putString(JSON.stringify(backup, null, 2), 'raw', {
                        contentType: 'application/json'
                    });

                    // Clean old backups (keep only last 20)
                    await cleanOldBackups();

                    alert('✅ Backup creato con successo!');
                    loadBackups();
                } catch (error) {
                    console.error('Error creating backup:', error);
                    alert('❌ Errore durante la creazione del backup: ' + error.message);
                } finally {
                    setCreating(false);
                }
            };

            const cleanOldBackups = async () => {
                try {
                    const storageRef = storage.ref('backups');
                    const result = await storageRef.listAll();
                    
                    if (result.items.length > MAX_BACKUPS) {
                        // Get metadata for all backups
                        const backupList = await Promise.all(
                            result.items.map(async (item) => {
                                const metadata = await item.getMetadata();
                                return {
                                    ref: item,
                                    created: new Date(metadata.timeCreated)
                                };
                            })
                        );

                        // Sort by date, oldest first
                        backupList.sort((a, b) => a.created - b.created);

                        // Delete oldest backups
                        const toDelete = backupList.slice(0, backupList.length - MAX_BACKUPS);
                        await Promise.all(toDelete.map(item => item.ref.delete()));

                        console.log(`Cleaned ${toDelete.length} old backups`);
                    }
                } catch (error) {
                    console.error('Error cleaning old backups:', error);
                }
            };

            const downloadBackup = (backup) => {
                const link = document.createElement('a');
                link.href = backup.url;
                link.download = backup.name;
                link.click();
            };

            const formatBytes = (bytes) => {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
            };

            return (
                <div className="p-6">
                    <div className="max-w-4xl mx-auto">
                        <div className="bg-white rounded-lg shadow-lg p-6">
                            <div className="flex items-center justify-between mb-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                                        <i className="fas fa-cog mr-3 text-blue-600"></i>
                                        Impostazioni e Backup
                                    </h2>
                                    <p className="text-gray-600 mt-1">Gestisci i backup dei tuoi dati</p>
                                </div>
                                <button
                                    onClick={createBackup}
                                    disabled={creating}
                                    className="bg-green-600 hover:bg-green-700 disabled:bg-gray-400 text-white px-6 py-3 rounded-lg font-semibold transition-colors"
                                >
                                    {creating ? (
                                        <>
                                            <i className="fas fa-spinner fa-spin mr-2"></i>
                                            Creazione...
                                        </>
                                    ) : (
                                        <>
                                            <i className="fas fa-plus-circle mr-2"></i>
                                            Crea Backup Ora
                                        </>
                                    )}
                                </button>
                            </div>

                            {/* Info Box */}
                            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                                <div className="flex items-start">
                                    <i className="fas fa-info-circle text-blue-600 text-xl mr-3 mt-1"></i>
                                    <div className="text-sm text-blue-800">
                                        <p className="font-semibold mb-1">Sistema Backup Automatico</p>
                                        <ul className="list-disc list-inside space-y-1 text-blue-700">
                                            <li>Backup automatico ogni domenica</li>
                                            <li>Conserva gli ultimi 20 backup (~5 mesi)</li>
                                            <li>Cancellazione automatica dei backup più vecchi</li>
                                            <li>I backup contengono tutti i dati delle auto e i link alle foto</li>
                                            <li>Le foto rimangono sempre su Firebase Storage (non servono backup)</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>

                            {/* Backups List */}
                            <div>
                                <h3 className="text-lg font-semibold text-gray-800 mb-4">
                                    <i className="fas fa-archive mr-2 text-gray-600"></i>
                                    Backup Disponibili ({backups.length})
                                </h3>

                                {loading ? (
                                    <div className="text-center py-12">
                                        <i className="fas fa-spinner fa-spin text-4xl text-gray-400 mb-3"></i>
                                        <p className="text-gray-500">Caricamento backup...</p>
                                    </div>
                                ) : backups.length === 0 ? (
                                    <div className="text-center py-12 bg-gray-50 rounded-lg">
                                        <i className="fas fa-database text-6xl text-gray-300 mb-4"></i>
                                        <p className="text-gray-500 text-lg">Nessun backup disponibile</p>
                                        <p className="text-gray-400 text-sm mt-2">Crea il tuo primo backup cliccando il pulsante qui sopra</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {backups.map((backup, index) => (
                                            <div
                                                key={backup.name}
                                                className="flex items-center justify-between p-4 bg-gray-50 hover:bg-gray-100 rounded-lg border border-gray-200 transition-colors"
                                            >
                                                <div className="flex items-center space-x-4">
                                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center ${
                                                        index === 0 ? 'bg-green-100' : 'bg-gray-200'
                                                    }`}>
                                                        <i className={`fas fa-file-archive ${
                                                            index === 0 ? 'text-green-600' : 'text-gray-600'
                                                        }`}></i>
                                                    </div>
                                                    <div>
                                                        <p className="font-semibold text-gray-800">
                                                            {backup.name}
                                                            {index === 0 && (
                                                                <span className="ml-2 text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">
                                                                    Più recente
                                                                </span>
                                                            )}
                                                        </p>
                                                        <p className="text-sm text-gray-500">
                                                            {new Date(backup.created).toLocaleString('it-IT')} · {formatBytes(backup.size)}
                                                        </p>
                                                    </div>
                                                </div>
                                                <button
                                                    onClick={() => downloadBackup(backup)}
                                                    className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                                                >
                                                    <i className="fas fa-download mr-2"></i>
                                                    Scarica
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function LoginPage() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (error) {
                    console.error('Login error:', error);
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        setError('Email o password non corretti');
                    } else if (error.code === 'auth/invalid-email') {
                        setError('Email non valida');
                    } else {
                        setError('Errore durante l\'accesso. Riprova.');
                    }
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-800 via-slate-700 to-blue-900 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
                        <div className="bg-gradient-to-r from-slate-700 to-blue-800 text-white p-8 text-center rounded-t-2xl">
                            <i className="fas fa-car text-6xl mb-4"></i>
                            <h1 className="text-3xl font-bold mb-2">TO.RI. MOTORS GEST</h1>
                            <p className="text-slate-200">Cloud Edition</p>
                            <div className="mt-3 inline-flex items-center bg-white/20 px-3 py-1 rounded-full text-xs">
                                <i className="fas fa-cloud mr-2"></i>
                                Dati salvati su cloud sicuro
                            </div>
                        </div>
                        <div className="p-8">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6 text-center">Accedi</h2>
                            {error && (
                                <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6">
                                    <i className="fas fa-exclamation-circle mr-2"></i>{error}
                                </div>
                            )}
                            <form onSubmit={handleLogin} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        <i className="fas fa-envelope mr-2 text-blue-600"></i>Email
                                    </label>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        required
                                        autoFocus
                                        disabled={loading}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        <i className="fas fa-lock mr-2 text-blue-600"></i>Password
                                    </label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        required
                                        disabled={loading}
                                    />
                                </div>
                                <button

        // Photo Carousel for Vehicle Cards
        function PhotoCarousel({ photos, alt }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);

            const minSwipeDistance = 50;

            const onTouchStart = (e) => {
                e.stopPropagation();
                setTouchEnd(null);
                setTouchStart(e.targetTouches[0].clientX);
            };

            const onTouchMove = (e) => {
                e.stopPropagation();
                setTouchEnd(e.targetTouches[0].clientX);
            };

            const onTouchEnd = (e) => {
                e.stopPropagation();
                if (!touchStart || !touchEnd) return;
                
                const distance = touchStart - touchEnd;
                const isLeftSwipe = distance > minSwipeDistance;
                const isRightSwipe = distance < -minSwipeDistance;

                if (isLeftSwipe && currentIndex < photos.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                }
                if (isRightSwipe && currentIndex > 0) {
                    setCurrentIndex(currentIndex - 1);
                }
            };

            const goToPrevious = (e) => {
                e.stopPropagation();
                setCurrentIndex(currentIndex > 0 ? currentIndex - 1 : currentIndex);
            };

            const goToNext = (e) => {
                e.stopPropagation();
                setCurrentIndex(currentIndex < photos.length - 1 ? currentIndex + 1 : currentIndex);
            };

            return (
                <div 
                    className="relative h-48 bg-gray-200 overflow-hidden group"
                    onTouchStart={onTouchStart}
                    onTouchMove={onTouchMove}
                    onTouchEnd={onTouchEnd}
                >
                    <img 
                        src={photos[currentIndex]} 
                        alt={alt}
                        className="w-full h-full object-cover"
                    />
                    
                    {photos.length > 1 && (
                        <>
                            {/* Navigation Arrows */}
                            {currentIndex > 0 && (
                                <button
                                    onClick={goToPrevious}
                                    className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/70 text-white rounded-full w-8 h-8 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                                >
                                    <i className="fas fa-chevron-left text-sm"></i>
                                </button>
                            )}
                            {currentIndex < photos.length - 1 && (
                                <button
                                    onClick={goToNext}
                                    className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/70 text-white rounded-full w-8 h-8 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                                >
                                    <i className="fas fa-chevron-right text-sm"></i>
                                </button>
                            )}

                            {/* Dots Indicator */}
                            <div className="absolute bottom-2 left-1/2 -translate-x-1/2 flex space-x-1.5">
                                {photos.map((_, index) => (
                                    <div
                                        key={index}
                                        className={`w-2 h-2 rounded-full transition-all ${
                                            index === currentIndex 
                                                ? 'bg-white w-6' 
                                                : 'bg-white/50'
                                        }`}
                                    />
                                ))}
                            </div>

                            {/* Photo Counter */}
                            <div className="absolute top-2 right-2 bg-black/60 text-white text-xs px-2 py-1 rounded-full">
                                {currentIndex + 1}/{photos.length}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        // Photo Lightbox for Full Screen View
        function PhotoLightbox({ photos, initialIndex = 0, onClose }) {
            const [currentIndex, setCurrentIndex] = useState(initialIndex);
            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);

            const minSwipeDistance = 50;

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') onClose();
                    if (e.key === 'ArrowLeft') goToPrevious();
                    if (e.key === 'ArrowRight') goToNext();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentIndex]);

            const onTouchStart = (e) => {
                setTouchEnd(null);
                setTouchStart(e.targetTouches[0].clientX);
            };

            const onTouchMove = (e) => {
                setTouchEnd(e.targetTouches[0].clientX);
            };

            const onTouchEnd = () => {
                if (!touchStart || !touchEnd) return;
                
                const distance = touchStart - touchEnd;
                const isLeftSwipe = distance > minSwipeDistance;
                const isRightSwipe = distance < -minSwipeDistance;

                if (isLeftSwipe && currentIndex < photos.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                }
                if (isRightSwipe && currentIndex > 0) {
                    setCurrentIndex(currentIndex - 1);
                }
            };

            const goToPrevious = () => {
                if (currentIndex > 0) setCurrentIndex(currentIndex - 1);
            };

            const goToNext = () => {
                if (currentIndex < photos.length - 1) setCurrentIndex(currentIndex + 1);
            };

            return (
                <div 
                    className="fixed inset-0 bg-black/95 z-50 flex items-center justify-center"
                    onClick={onClose}
                >
                    {/* Close Button */}
                    <button
                        onClick={onClose}
                        className="absolute top-4 right-4 bg-white/10 hover:bg-white/20 text-white rounded-full w-12 h-12 flex items-center justify-center text-2xl z-10"
                    >
                        <i className="fas fa-times"></i>
                    </button>

                    {/* Photo Counter */}
                    <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-white/10 text-white px-4 py-2 rounded-full text-sm z-10">
                        Foto {currentIndex + 1} di {photos.length}
                    </div>

                    {/* Main Image */}
                    <div 
                        className="relative max-w-7xl max-h-[90vh] mx-auto px-4"
                        onClick={(e) => e.stopPropagation()}
                        onTouchStart={onTouchStart}
                        onTouchMove={onTouchMove}
                        onTouchEnd={onTouchEnd}
                    >
                        <img 
                            src={photos[currentIndex]} 
                            alt={`Foto ${currentIndex + 1}`}
                            className="max-w-full max-h-[90vh] object-contain"
                        />

                        {/* Navigation Arrows */}
                        {currentIndex > 0 && (
                            <button
                                onClick={(e) => { e.stopPropagation(); goToPrevious(); }}
                                className="absolute left-4 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/20 text-white rounded-full w-14 h-14 flex items-center justify-center text-2xl"
                            >
                                <i className="fas fa-chevron-left"></i>
                            </button>
                        )}
                        {currentIndex < photos.length - 1 && (
                            <button
                                onClick={(e) => { e.stopPropagation(); goToNext(); }}
                                className="absolute right-4 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/20 text-white rounded-full w-14 h-14 flex items-center justify-center text-2xl"
                            >
                                <i className="fas fa-chevron-right"></i>
                            </button>
                        )}
                    </div>

                    {/* Thumbnails */}
                    {photos.length > 1 && (
                        <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-2 max-w-full overflow-x-auto px-4">
                            {photos.map((photo, index) => (
                                <img
                                    key={index}
                                    src={photo}
                                    alt={`Thumbnail ${index + 1}`}
                                    onClick={(e) => { e.stopPropagation(); setCurrentIndex(index); }}
                                    className={`h-16 w-16 object-cover rounded cursor-pointer transition-all ${
                                        index === currentIndex 
                                            ? 'ring-2 ring-white opacity-100' 
                                            : 'opacity-50 hover:opacity-75'
                                    }`}
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        }

                const matchesSearch = !searchQuery ||

                    v.model?.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    v.plate?.toLowerCase().includes(searchQuery.toLowerCase());

                    (filterStatus === 'da-trasportare' && !v.transportOrdered && !v.inStock && !v.sold) ||
                    (filterStatus === 'in-stock' && v.inStock && !v.sold) ||
                    (filterStatus === 'in-arrivo' && v.transportOrdered && !v.delivered && !v.sold) ||
                    (filterStatus === 'vendute' && v.sold);

                const salePrice = parseFloat(v.salePrice) || 0;
                const matchesPrice = salePrice <= maxPrice;

                return matchesSearch && matchesFilter && matchesFuel && matchesPrice;

                // Sort by creation timestamp - newest first
                const timeA = a.createdAt?.seconds || 0;
                const timeB = b.createdAt?.seconds || 0;
                return timeB - timeA;
            });

                const expenses = (v.expenses || []).reduce((sum, e) => sum + (parseFloat(e.cost) || 0), 0);

                                : e

                        onUpdate(vehicle.id, { expenses: updatedExpenses });
                        setEditingExpense(null);

                        onAddExpense(vehicle.id, newExpense);

                    setNewExpense({ description: '', cost: '', date: new Date().toISOString().split('T')[0], isQuickOption: false });
                    setShowExpenseForm(false);

        function AnalisiMargini({ vehicles }) {
            const [selectedYear, setSelectedYear] = useState('all');
            const [selectedMonth, setSelectedMonth] = useState('all');

            // Get unique years from sold vehicles based on sale date
            const years = [...new Set(vehicles
                .filter(v => v.sold && v.saleDate)
                .map(v => new Date(v.saleDate).getFullYear())
            )].sort((a, b) => b - a);

            // Filter sold vehicles by selected year/month based on sale date
            const soldVehicles = vehicles.filter(v => {
                if (!v.sold) return false;
                
                if (selectedYear !== 'all') {
                    const year = v.saleDate ? new Date(v.saleDate).getFullYear() : null;
                    if (year !== parseInt(selectedYear)) return false;
                    
                    if (selectedMonth !== 'all') {
                        const month = v.saleDate ? new Date(v.saleDate).getMonth() : null;
                        if (month !== parseInt(selectedMonth)) return false;
                    }
                }
                
                return true;
            });
            
            const analytics = soldVehicles.map(v => {
                const expenses = (v.expenses || []).reduce((sum, e) => sum + (parseFloat(e.cost) || 0), 0);
                const totalCost = (parseFloat(v.purchasePrice) || 0) + expenses;
                const revenue = parseFloat(v.salePrice) || 0;
                const margin = revenue - totalCost;
                const marginPercent = totalCost > 0 ? (margin / totalCost * 100) : 0;
                return { ...v, totalCost, revenue, margin, marginPercent, expenses };
            });

            const totalMargin = analytics.reduce((sum, v) => sum + v.margin, 0);
            const avgMarginPercent = analytics.length > 0 ? analytics.reduce((sum, v) => sum + v.marginPercent, 0) / analytics.length : 0;
            const totalInvested = vehicles.filter(v => !v.sold).reduce((sum, v) => sum + (parseFloat(v.purchasePrice) || 0) + ((v.expenses || []).reduce((s, e) => s + (parseFloat(e.cost) || 0), 0)), 0);

            const months = [
                'Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno',

        // Trade Catalog for Wholesalers - Password Protected
        function TradeCatalog() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const TRADE_PASSWORD = 'commercianti2026';

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === TRADE_PASSWORD) {
                    setIsAuthenticated(true);
                    sessionStorage.setItem('tradeCatalogAuth', 'true');
                } else {
                    alert('❌ Password errata! Riprova.');
                    setPasswordInput('');
                }
            };

            // Check if already authenticated in this session
            useEffect(() => {
                if (sessionStorage.getItem('tradeCatalogAuth') === 'true') {
                    setIsAuthenticated(true);
                }
            }, []);

            // Show password screen if not authenticated
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-800 to-blue-900 flex items-center justify-center p-4">
                        <div className="bg-white rounded-lg shadow-2xl p-8 max-w-md w-full">
                            <div className="text-center mb-6">
                                <i className="fas fa-lock text-6xl text-blue-600 mb-4"></i>
                                <h1 className="text-2xl font-bold text-gray-800 mb-2">
                                    Catalogo Commercianti
                                </h1>
                                <p className="text-gray-600">
                                    Inserisci la password per accedere
                                </p>
                            </div>
                            <form onSubmit={handlePasswordSubmit}>
                                <div className="mb-6">
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Password
                                    </label>
                                    <input
                                        type="password"
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="Inserisci password..."
                                        required
                                        autoFocus
                                    />
                                </div>
                                <button
                                    type="submit"
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors"
                                >
                                    <i className="fas fa-sign-in-alt mr-2"></i>
                                    Accedi
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return <CatalogContent priceType="trade" title="Catalogo Commercianti" />;
        }

            useEffect(() => {
                // Fetch vehicles without authentication
                const unsubscribe = db.collection('vehicles')
                    .onSnapshot(snapshot => {
                        const vehicleList = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        setVehicles(vehicleList);
                        setLoading(false);
                    }, error => {
                        console.error('Error fetching vehicles:', error);
                        setLoading(false);
                    });

                return () => unsubscribe();
            }, []);

            // Filter vehicles - only show In Stock or In Arrivo
            const availableVehicles = vehicles.filter(v => {
                if (v.sold) return false; // Never show sold cars
                
                if (filterStatus === 'all') {
                    if (!v.inStock && !v.transportOrdered) return false;
                } else if (filterStatus === 'in-stock') {
                    if (!v.inStock) return false;
                } else if (filterStatus === 'in-arrivo') {
                    if (!v.transportOrdered || v.delivered) return false;
                }

                // Fuel filter
                if (fuelFilter !== 'all' && v.fuelType !== fuelFilter) return false;

                // Price filter - use trade price for trade catalog, sale price for public
                const price = priceType === 'trade' 
                    ? parseFloat(v.tradePrice || v.salePrice || 0)
                    : parseFloat(v.salePrice || 0);
                if (price > maxPrice) return false;

                return true;
            }).sort((a, b) => {
                const timeA = a.createdAt?.seconds || 0;
                const timeB = b.createdAt?.seconds || 0;
                return timeB - timeA;
            });

                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Photo Lightbox */}
                    {lightboxOpen && selectedVehicle && selectedVehicle.photos && selectedVehicle.photos.length > 0 && (
                        <PhotoLightbox 
                            photos={selectedVehicle.photos} 
                            initialIndex={lightboxIndex}
                            onClose={() => setLightboxOpen(false)}
                        />
                    )}

                    {/* Footer */}
                    <div className="bg-slate-800 text-white p-6 mt-12">
                        <div className="max-w-7xl mx-auto text-center">
                            <p className="text-slate-300">
                                Per informazioni contattare TO.RI. MOTORS
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed'));
            });
        }
    </script>
</body>
</html>
